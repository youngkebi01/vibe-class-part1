<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         .container{
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            height: 100px;
            background-color: red;
         }

        div {
             border: 1px solid red;
        }
        .outline {
            width: 400px;
            height: 100px;
            background: blue;
        }

        /* .child 클래스의 width를 50vw로 설정하여 뷰포트 너비의 50%를 차지하도록 하고, 
        height를 100vh로 설정하여 뷰포트 높이의 100%를 차지하도록 합니다. */
        .child {
            width: 60%;
            height: 90%;
            background: yellow;
        }

        .lastchild {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 500px;
            height: 100px;
            background: cyan;
        }
  
    </style>    

</head>
<body>
    <h1>쇼핑몰</h1>

    <h2>전자제품</h2>
    <p>노트북, 모니터</p>

    <h2>의류</h2>
    <p>셔츠, 바지</p>

    <h3>fuck 의류</h3>
    <p>셔츠, 바지 <span style="color:red;"> SPAN 글자 </span></p>

    <div class="container">
        <input type="text"  id="userId" placeholder="ID 입력 ">
        <div class="outline"> 
            <div class="child"> 
                <div class="child"> 
                    <h3>비번 입력 받기</h3>
                    <input type="text"  id="password" placeholder="비번 입력 ">
                    <button type="button"  class="loginBtn" onclick="login();">로그인</button>
                   </div>
                </div> 
            </div>
        </div>
    </div>
    <div class="lastchild"> 
        <h3>last child</h3>
    </div> 

    <script>

        function login() {
            // html 값을 -> 자바스크립트로 가져올 수 있음
            // 자바스크립트의 결과 값 -> html 영역에 적용 가능 
            //html 영역을  자바스크립트에서는 docuemnt 라는 객체를 사용 
            const userId = document.getElementById('userId');
            const passwd = document.getElementById('passwd');

            if(userId.value.trim().length === 0) {
                alert('아이디를 입력하십시오.');
                //함수끝내기
                return;
            }

             if(passwd.value.trim().length === 0) {
                alert('패스워드를 입력하십시오.');
                //함수끝내기
                return;
            }

            alert('로그인 되었습니다.');

        }

    </script>
</body>
</html>
