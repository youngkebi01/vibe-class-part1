<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>

    // 배열
    const arr = [1,2,3,4,5];

    // 콜백 함수를 받는 함수
    function loop(callback) {

        for(let i = 0; i < arr.length; i++) {

            callback(arr[i]);
        }
    }

    // 익명 함수를 콜백으로 전달
    loop(function(item) {
        console.log(item);
    });

</script>

</body>
</html>
