<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- 이 버튼을 누르면 showFruits() 함수가 실행되어서 과일 배열이 출력됨 -->
    <button onclick="showFruits()">출력</button>
    <!-- 출력을 여기다 해아하니까 id를 result로 지정해줌   -->
    <p id="result"></p>  

</body>

<script>

    let count = 0;
    const PI = 3.14;

    // 배열
    const arr = [1, 2, 3, 4, 5];

    // 과일 배열
    const arr1 = ["apple", "banana", "orange"];

    // 값 추가
    arr1.push("grape");

    // 화면 출력 함수
    function showFruits() {

        let text = "";

        // 배열 반복
        for(let i = 0; i < arr1.length; i++) {

            text += arr1[i] + "<br>";
            console.log(arr1[i]);  // console.log는 개발자용 콘솔에 출력하는 함수
        }

        // HTML에 출력        // 요고는 개발자용 console에 뿌려 짐 => console.log(text);
        document.getElementById("result").innerHTML = text;
    }

    // 함수 실행  // 저 위의 이 버튼을 누르면이 없으면 아래의 함수가 바로 실행되어버림
    // showFruits();

</script>
</html>
