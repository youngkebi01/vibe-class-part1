<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Todo List</title>

<style>
    body {
        font-family: Arial;
        width: 400px;
        margin: 50px auto;
    }

    h1 {
        text-align: center;
    }

    .input-area {
        display: flex;
        gap: 10px;
    }

    input {
        flex: 1;
        padding: 10px;
        font-size: 16px;
    }

    button {
        padding: 10px 15px;
        cursor: pointer;
    }

    ul {
        list-style: none;
        padding: 0;
        margin-top: 20px;
    }

    li {
        display: flex;
        justify-content: space-between;
        background: #f1f1f1;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 5px;
    }

    .delete-btn {
        background: red;
        color: white;
        border: none;
        border-radius: 4px;
    }
</style>
</head>

<body>

<h1>할 일 목록</h1>

<div class="input-area">
    <input type="text" id="todoInput" placeholder="할 일을 입력하세요">
    <button onclick="addTodo()">추가</button>
</div>

<ul id="todoList"></ul>

<script>

function addTodo() {

    const input = document.getElementById("todoInput");
    const text = input.value.trim();

    if (text === "") {
        alert("내용을 입력하세요.");
        return;
    }

    const li = document.createElement("li");

    li.innerHTML = `
        <span>${text}</span>
        <button class="delete-btn">삭제</button>
    `;

    const deleteBtn = li.querySelector(".delete-btn");

    deleteBtn.addEventListener("click", function() {
        li.remove();
    });

    document.getElementById("todoList").appendChild(li);

    input.value = "";
}

</script>

</body>
</html>
