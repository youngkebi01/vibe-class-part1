<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="newArr"></p>
    <script>
        // 배열
        const arr = [1,2,3,4,5];

        // 콜백 함수를 받는 함수
        function map(callback) {
            const newArr = [];
            for(let i = 0; i < arr.length; i++) {
                newArr.push(callback(arr[i]));
            }
            return newArr;
        }

        // map() 함수 사용
        // map 함수는  매개변수로   (값, index,  배열자신)  을 매개변수로 가지는  callback 함수를 받습니다.
        // 해당 callback 함수는 반드시  return 이 있는 형태여야 합니다.
        const newArray = map(function(item) {
            return item * 2;
        });

        const arr = [1,2,3,10, 11, 16, 20, 22, 40];

        // filter() 함수 사용 - 짝수만 출력
        // filter는 callback 함수 결과가 true 이면 해당 값을 포함하고,  false 이면 해당 값을 제외합니다. 
        const even = arr.filter(( val, index)=> val % 2 == 0 );

        // 결과 출력
        document.getElementById("newArr").textContent = newArray;

</script>

</body>
</html>
