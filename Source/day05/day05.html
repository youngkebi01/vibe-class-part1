<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>사용자 정보 입력</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 40px;
    }

    .form-box {
      width: 320px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      margin-top: 0;
    }

    label {
      display: block;
      margin-top: 15px;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      box-sizing: border-box;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: #0078ff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #005fd1;
    }

    #result {
      margin-top: 20px;
      background: #eef;
      padding: 10px;
      border-radius: 5px;
      display: none;
    }
  </style>
</head>

<body>

  <div class="form-box">
    <h2>사용자 정보 입력</h2>

    <label>이름</label>
    <input type="text" id="name" placeholder="이름 입력">

    <label>성별</label>
    <select id="gender">
      <option value="">선택하세요</option>
      <option value="남성">남성</option>
      <option value="여성">여성</option>
    </select>

    <label>전화번호</label>
    <input type="text" id="phone" placeholder="010-1234-5678">

    <button onclick="saveData()">입력 완료</button>

    <div id="result"></div>
  </div>

  <script>
    function saveData() {
      const name = document.getElementById("name").value;
      const gender = document.getElementById("gender").value;
      const phone = document.getElementById("phone").value;

      const result = document.getElementById("result");

      result.style.display = "block";
      result.innerHTML = `
        <b>입력된 정보</b><br>
        이름: ${name}<br>
        성별: ${gender}<br>
        전화번호: ${phone}
      `;

      console.log("이름:", name);
      console.log("성별:", gender);
      console.log("전화번호:", phone);
    }
  </script>

</body>
</html>
