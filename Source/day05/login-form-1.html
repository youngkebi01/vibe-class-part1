<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            height: 100vh;
            border: 2px solid blue;
        }

        .login-form {
            width: auto;
            height: auto;
            border: 2px solid black;
            border-radius: 5px;
        }
/*
        .item1 {
            width: 80px;
            height: 80px;
            background: orange;
            border-radius: 5px;
        }

        .item2 {
            width: 40;
            height: 40px;
            background: blue;    
        }
*/
        .form {
           display: flex;
           flex-direction: column;
           align-items: center;

        } 

        .title {
            text-align: center;
        }

        .loginBtn{
            width: 100%;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-form">
            <div class="form">
                <form >
                    <span class="title"><h2>로그인</h2></span>
                    <div>
                        <input class="title" id="userid" type="text" placeholder="아이디 입력">
                    </div>
                    <div>
                        <input class="title" id="password" type="password" placeholder="비밀번호 입력">
                    </div>
                    <div>
                        <button type="button" class="loginBtn" onclick="login();">"로그인"</button>
                    </div>
                </form>
            </div>
        </div>    
    </div>
    <script>

        function login() {
            // html 값을 -> 자바스크립트로 가져올 수 있음
            // 자바스크립트의 결과 값 -> html 영역에 적용 가능 

            //html 영역을  자바스크립트에서는 docuemnt 라는 객체를 사용 
            const userId = document.getElementById('userId');
            const passwd = document.getElementById('passwd');

            if(userId.value.trim().length === 0) {
                alert('아이디를 입력하십시오.');
                //함수끝내기
                return;
            }


             if(passwd.value.trim().length === 0) {
                alert('패스워드를 입력하십시오.');
                //함수끝내기
                return;
            }

            alert('로그인 되었습니다.');

        }

    </script>
</body>
</html>
