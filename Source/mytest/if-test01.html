<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <div>   
        <input type="text" id="userId" placeholder="입력 ">
    </div>

    <div>
        <button type="button" onclick="for_test();">점수입력</button>
    </div>
    
    <script>

        function for_test() {
            const score = Document.querySelector('#score');
            
                if(score.value.trim().length === 0) {
                    alert('점수를 입력하십시오.');
                    //함수끝내기
                    return;
                }
    
                if(isNaN(score.value)) {
                    alert('숫자를 입력하십시오.');
                    //함수끝내기
                    return;
                }   

                if(score.value <  65) {
                    alert('65점 이상을 입력하십시오.');
                    //함수끝내기
                    return;
                }
            
        }

    </script>
</body>
</html>
